<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1000"
   height="1000"
   viewBox="0 0 1000 1000"
   version="1.1"
   id="svg2"
   sodipodi:docname="Mars.svg"
   inkscape:version="1.4.2 (f4327f4, 2025-05-13)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview2"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="0.34"
     inkscape:cx="454.41176"
     inkscape:cy="422.05882"
     inkscape:window-width="1920"
     inkscape:window-height="1017"
     inkscape:window-x="-8"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg2" />
  <!-- Couleurs -->
  <defs
     id="defs1">
    <marker
       style="overflow:visible"
       id="ArrowWideHeavy"
       refX="0"
       refY="0"
       orient="auto-start-reverse"
       inkscape:stockid="Wide, heavy arrow"
       markerWidth="1"
       markerHeight="1"
       viewBox="0 0 1 1"
       inkscape:isstock="true"
       inkscape:collect="always"
       preserveAspectRatio="xMidYMid">
      <path
         style="fill:context-stroke;fill-rule:evenodd;stroke:none"
         d="m 1,0 -3,3 h -2 l 3,-3 -3,-3 h 2 z"
         id="path3" />
    </marker>
    <marker
       style="overflow:visible"
       id="ArrowWide"
       refX="0"
       refY="0"
       orient="auto-start-reverse"
       inkscape:stockid="Wide arrow"
       markerWidth="1"
       markerHeight="1"
       viewBox="0 0 1 1"
       inkscape:isstock="true"
       inkscape:collect="always"
       preserveAspectRatio="xMidYMid">
      <path
         style="fill:none;stroke:context-stroke;stroke-width:1;stroke-linecap:butt"
         d="M 3,-3 0,0 3,3"
         transform="rotate(180,0.125,0)"
         sodipodi:nodetypes="ccc"
         id="path5" />
    </marker>
    <!-- Masque : cercle plein (blanc) moins l’ellipse (noir) = trou transparent -->
    <mask
       id="sunRingMask">
      <rect
         x="0"
         y="0"
         width="512"
         height="512"
         fill="#000000"
         id="rect1" />
      <!-- disque principal (zone visible) -->
      <circle
         cx="256"
         cy="256"
         r="220"
         fill="#ffffff"
         id="circle1" />
      <!-- forme oblongue intérieure (trou) -->
      <ellipse
         cx="256"
         cy="256"
         rx="145"
         ry="200"
         transform="rotate(-25,256,256)"
         fill="#000000"
         id="ellipse1" />
    </mask>
  </defs>
  <!-- Anneau du soleil (orange), le masque creuse l’ellipse oblique -->
  <!-- Pastille centrale -->
  <g
     id="g5"
     transform="matrix(1.1270682,0,0,1.1270682,-12.706819,-102.12748)">
    <rect
       x="0"
       y="0"
       width="512"
       height="512"
       fill="#f59e0b"
       mask="url(#sunRingMask)"
       id="rect2"
       transform="matrix(1.1954995,0,0,1.1954995,99.999993,264.04613)"
       style="fill:#d40000;marker-end:url(#ArrowWide)" />
    <path
       style="fill:#d40000;stroke:#d40000;stroke-width:41.699;stroke-miterlimit:2;stroke-dasharray:none;marker-end:url(#ArrowWideHeavy)"
       d="m 586.02759,400.78883 192.506,-169.7946"
       id="path1" />
  </g>
</svg>
