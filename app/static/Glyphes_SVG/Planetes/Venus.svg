  <!-- Couleurs -->
  <defs
     id="defs1">
    <!-- Masque : cercle plein (blanc) moins l’ellipse (noir) = trou transparent -->
    <mask
       id="sunRingMask">
      <rect
         x="0"
         y="0"
         width="512"
         height="512"
         fill="#000000"
         id="rect1" />
      <!-- disque principal (zone visible) -->
      <circle
         cx="256"
         cy="256"
         r="220"
         fill="#ffffff"
         id="circle1" />
      <!-- forme oblongue intérieure (trou) -->
      <ellipse
         cx="256"
         cy="256"
         rx="145"
         ry="200"
         transform="rotate(-25,256,256)"
         fill="#000000"
         id="ellipse1" />
    </mask>
  </defs>
  <!-- Anneau du soleil (orange), le masque creuse l’ellipse oblique -->
  <!-- Pastille centrale -->
  <g
     id="g1"
     transform="matrix(1.0672419,0,0,1.0672419,36.955069,44.943257)">
    <rect
       x="0"
       y="0"
       width="512"
       height="512"
