<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1000"
   height="1000"
   viewBox="0 0 1000 1000"
   version="1.1"
   id="svg2"
   sodipodi:docname="Sun.svg"
   inkscape:version="1.4.2 (f4327f4, 2025-05-13)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview2"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="0.59"
     inkscape:cx="441.52542"
     inkscape:cy="344.91525"
     inkscape:window-width="1920"
     inkscape:window-height="1017"
     inkscape:window-x="-8"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg2" />
  <!-- Couleurs -->
  <defs
     id="defs1">
    <!-- Masque : cercle plein (blanc) moins l’ellipse (noir) = trou transparent -->
    <mask
       id="sunRingMask">
      <rect
         x="0"
         y="0"
         width="512"
         height="512"
         fill="#000000"
         id="rect1" />
      <!-- disque principal (zone visible) -->
      <circle
         cx="256"
         cy="256"
         r="220"
         fill="#ffffff"
         id="circle1" />
      <!-- forme oblongue intérieure (trou) -->
      <ellipse
         cx="256"
         cy="256"
         rx="145"
         ry="200"
         transform="rotate(-25,256,256)"
         fill="#000000"
         id="ellipse1" />
    </mask>
  </defs>
  <!-- Anneau du soleil (orange), le masque creuse l’ellipse oblique -->
  <!-- Pastille centrale -->
  <g
     id="g2"
     transform="matrix(1.5625,0,0,1.5625,100,100)">
    <rect
       x="0"
       y="0"
       width="512"
       height="512"
       fill="#f59e0b"
       mask="url(#sunRingMask)"
       id="rect2" />
    <circle
       cx="256"
       cy="256"
       r="28"
       fill="#d97706"
       id="circle2" />
  </g>
</svg>
